<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>The Music Factory</title>
	
	<!-- the bootstrap css should be first -->
	<link rel="stylesheet" href="css/bootstrap.min.css">
	
	<!-- our css file can (and should) overwrite anything specific to bootstrap if we want it to since it comes second -->
	<link rel="stylesheet" href="css/main.css">

	<!-- include bootstrap js for our navbar -->
	<script src="js/bootstrap.min.js"></script>

</head>
<body>

	<!-- NAVBAR -->
	<nav class="navbar navbar-expand-lg bg-body-tertiary">
		<div class="container-fluid">
			<a class="navbar-brand" href="#">The Music Factory</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
			<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarSupportedContent">
			<ul class="navbar-nav me-auto mb-2 mb-lg-0">
				<li class="nav-item">
				<a class="nav-link active" aria-current="page" href="#">Home</a>
				</li>
				<li class="nav-item">
				<a class="nav-link" href="#">Link</a>
				</li>
				<li class="nav-item dropdown">
				<a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
					Dropdown
				</a>
				<ul class="dropdown-menu">
					<li><a class="dropdown-item" href="#">Action</a></li>
					<li><a class="dropdown-item" href="#">Another action</a></li>
					<li><hr class="dropdown-divider"></li>
					<li><a class="dropdown-item" href="#">Something else here</a></li>
				</ul>
				</li>
				<li class="nav-item">
				<a class="nav-link disabled" aria-disabled="true">Disabled</a>
				</li>
			</ul>
			</div>
		</div>
	</nav>

	<!-- consider container to be the grid container -->
	<div class="container">

		<!-- the class name "row" creates a row like inside a grid -->
		<div class="row">

			<!-- the class name "col" creates a column -->
			<div class="col-8 col-md-6">
				<img class="w-100" src="img/large-dusty-shoes.jpg">
			</div>

			<div class="col-4 col-md-6">
				<img class="w-100" src="img/large-low-lustre.jpg">
			</div>

		</div>

		<!-- NEXT ROW -->
		<div class="row">

			<div class="col-12 col-md-4">
				<div class="card">
					<div class="card-header">
						<h2>Juliette</h2>
					</div>
					<div class="card-body">
						<img class="w-100" src="img/large-juliette.jpg">
					</div>
				</div>
			</div>

			<div class="col-12 col-md-4">
				<img class="w-100" src="img/large-plastic-brain.jpg">
			</div>

			<div class="col-12 col-md-4">
				<img class="w-100" src="img/large-plastic-brain.jpg">
			</div>

		</div>

	</div>
	
</body>
</html>
